services:
    db:
        image: postgres:latest
        container_name: taskvel_db
        restart: always
        env_file:
            - .env
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD", "pg_isready", "-U", "postgres" ]
            interval: 5s
            timeout: 3s
            retries: 5
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - taskvel_network

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: taskvel_app
        restart: always
        working_dir: /var/www/html
        ports:
            - "8000:8000"
        volumes:
            - .:/var/www/html
        env_file:
            - .env
        depends_on:
            db:
              condition: service_healthy
        networks:
            - taskvel_network

volumes:
    postgres_data:

networks:
    taskvel_network:
        driver: bridge
